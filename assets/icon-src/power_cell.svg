<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">

  <defs>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity=".62"/>
    </filter>
    <filter id="glowCyan" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#f4aa39" flood-opacity=".72"/>
    </filter>
    <linearGradient id="plate" x1="22" y1="18" x2="106" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#293c3c"/><stop offset=".52" stop-color="#111d1e"/><stop offset="1" stop-color="#070d0e"/>
    </linearGradient>
    <linearGradient id="metal" x1="18" y1="18" x2="112" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b8ac92"/><stop offset=".46" stop-color="#6e624f"/><stop offset="1" stop-color="#2b251d"/>
    </linearGradient>
    <linearGradient id="rust" x1="16" y1="12" x2="112" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d58d49"/><stop offset=".44" stop-color="#8c431e"/><stop offset="1" stop-color="#2a1810"/>
    </linearGradient>
  </defs>

<rect width="128" height="128" fill="none"/>
<g transform="translate(2 2) scale(.96875)">

    <g filter="url(#soft)">
      <rect x="39" y="22" width="52" height="84" rx="12" fill="url(#metal)" stroke="#2c251f" stroke-width="4"/>
      <rect x="48" y="31" width="34" height="66" rx="7" fill="#082629" stroke="#577271" stroke-width="2"/>
      <rect x="54" y="38" width="22" height="52" rx="4" fill="#54f0ee" opacity=".88" filter="url(#glowCyan)"/>
      <path d="M56 48h18M56 61h18M56 74h18" stroke="#d9ffff" stroke-width="3" opacity=".6"/>
      <path d="M49 26h32M49 102h32" stroke="#b08b51" stroke-width="4" stroke-linecap="round"/>
    </g>
</g>
</svg>