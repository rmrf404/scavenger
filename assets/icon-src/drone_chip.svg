      <path d="M43 52h42M43 65h42M43 78h42" stroke="#243f40" stroke-width="2"/>
      <path d="M49 69l10-17 8 13 13-24-8 25h12L62 90l6-21z" fill="#54f0ee" filter="url(#glowCyan)"/>
      <g stroke="#c8994e" stroke-width="4" stroke-linecap="round">
        <path d="M28 40h8M28 54h8M28 68h8M28 82h8M92 40h8M92 54h8M92 68h8M92 82h8"/>
      </g>
    </g>
